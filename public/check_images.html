<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #333; color: white; display: flex; flex-wrap: wrap; gap: 20px; }
  .card { border: 1px solid #555; padding: 10px; text-align: center; }
  img { max-width: 300px; height: auto; background: white; }
  .bg-check { background: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; }
</style>
</head>
<body>
  <div class="card">
    <p>Card 1</p>
    <img src="task1_card1.png" class="bg-check" alt="Card 1">
  </div>
  <div class="card">
    <p>Card 2</p>
    <img src="task1_card2.png" class="bg-check" alt="Card 2">
  </div>
  <div class="card">
    <p>Card 3</p>
    <img src="task1_card3.png" class="bg-check" alt="Card 3">
  </div>
  <div class="card">
    <p>Task 1 Img</p>
    <img src="task-1-img.png" class="bg-check" alt="Task 1 Img">
  </div>
</body>
</html>
